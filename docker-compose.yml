version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lab6db
    ports:
      - "5432:5432"

  api:
    build:
      context: ./Lab6-7-api
      dockerfile: Lab6.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Release
      - DB_CONNECTION_STRING=Host=db;Port=5432;Database=lab6db;Username=postgres;Password=password
    ports:
      - "5000:8080"
    depends_on:
      - db
