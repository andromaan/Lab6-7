name: CI - Build and Test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x" # Або 9.0.x в залежності від вашого global.json
          quality: "preview"

      - name: Restore Dependencies
        run: dotnet restore Lab6-7-api/Lab6-7.sln

      - name: Build API
        run: dotnet build Lab6-7-api/Lab6-7.sln --configuration Release --no-restore

      - name: Run Tests (Lab 4, Unit, Integration with Testcontainers)
        # Testcontainers автоматично підніме контейнер з базою (Postgres/SQL Server),
        # оскільки GitHub runner вже має запущений Docker Daemon.
        run: dotnet test Lab6-7-api/Lab6-7.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"
